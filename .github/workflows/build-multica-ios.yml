name: Build Multica iOS IPA

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Multica repo ref to build
        required: true
        default: main
      profile:
        description: Build variant
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: n4s5ti/multica
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Prebuild native project
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: npx expo prebuild --platform ios --clean

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build archive (unsigned)
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: |
          xcodebuild clean archive \
            -workspace ios/Multica.xcworkspace \
            -scheme Multica \
            -configuration Release \
            -archivePath build/Multica.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (Payload/Multica.app)
        run: |
          mkdir -p Payload
          cp -R "apps/mobile/build/Multica.xcarchive/Products/Applications/Multica.app" \
            "Payload/Multica.app"
          cd Payload && zip -r ../multica.ipa . && cd ..
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: multica-ios-unsigned
          path: multica.ipa
          retention-days: 7
